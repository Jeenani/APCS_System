services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: asutp_postgres
    environment:
      POSTGRES_DB: asutp_tasks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: r2d2m
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - asutp-network
    restart: unless-stopped

  # ============================================
  # Go Server
  # ============================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: asutp_server
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - asutp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ============================================
  # Caddy - Reverse Proxy + HTTPS
  # (Опционально для production)
  # ============================================
  caddy:
    image: caddy:2-alpine
    container_name: asutp_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - asutp-network
    depends_on:
      - server
    restart: unless-stopped
    # Раскомментируйте строку ниже чтобы включить Caddy
    # profiles: ["caddy"]

# ============================================
# Networks
# ============================================
networks:
  asutp-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  pgdata:
  caddy_data:
  caddy_config:
